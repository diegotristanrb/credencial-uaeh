<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --vino:#7a0f1d;
  --vino-osc:#5a0b15;
  --blanco:#ffffff;
  --gris:#f5f5f5;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:linear-gradient(160deg,var(--vino),var(--vino-osc));
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  width:100%;
  max-width:380px;
  padding:20px;
}

.card{
  background:var(--blanco);
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
  overflow:hidden;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

.header{
  background:var(--vino);
  padding:18px;
  text-align:center;
  color:white;
  font-weight:600;
  font-size:18px;
  letter-spacing:1px;
}

.content{
  padding:22px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ddd;
  transition:0.2s;
}

input:focus{
  border-color:var(--vino);
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--vino);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:var(--vino-osc);
}

.hidden{display:none}

/* CREDENCIAL */
.foto{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid var(--vino);
  margin-top:10px; /* ya no invade el header */
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.nombre{
  font-weight:600;
  font-size:16px;
  margin-top:10px;
}

.info{
  font-size:13px;
  color:#444;
  margin:4px 0;
}

.divider{
  height:1px;
  background:#eee;
  margin:15px 0;
}

.qr{
  margin-top:10px;
  background:#fff;
  padding:10px;
  border-radius:12px;
  display:flex;
  justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.timer{
  margin-top:10px;
  font-size:13px;
  color:var(--vino);
  font-weight:600;
}

.status{
  margin-top:8px;
  font-size:12px;
  color:green;
  font-weight:600;
}

</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
  <div class="header">UAEH</div>
  <div class="content">
    <input type="text" id="cuenta" placeholder="Número de cuenta">
    <input type="password" id="nip" placeholder="NIP">
    <button onclick="login()">Ingresar</button>
    <p id="error" style="color:red; display:none;">Datos incorrectos</p>
  </div>
</div>

<!-- CREDENCIAL -->
<div id="credencial" class="card hidden">
  <div class="header">Credencial Digital</div>
  <div style="height:10px;"></div>
  <div class="content">

    <img class="foto" src="https://randomuser.me/api/portraits/men/32.jpg">

    <div class="nombre" id="nombre"></div>
    <div class="info" id="info"></div>
    <div class="info" id="correo"></div>

    <div class="divider"></div>

    <div class="qr">
      <canvas id="qrCanvas"></canvas>
    </div>

    <div class="timer" id="timer"></div>
    <div class="status">✔ Credencial válida</div>

    <button onclick="logout()">Cerrar sesión</button>

  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>

const user = {
  cuenta: "12345",
  nip: "1234",
  nombre: "Juan Pérez",
  semestre: "5",
  grupo: "A",
  propedeutico: "Físico-Matemático",
  correo: "juan@uaeh.edu.mx"
};

let interval;

function login(){
  const cuenta = document.getElementById("cuenta").value;
  const nip = document.getElementById("nip").value;

  if(cuenta === user.cuenta && nip === user.nip){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("credencial").classList.remove("hidden");

    document.getElementById("nombre").innerText = user.nombre;
    document.getElementById("info").innerText = `Semestre ${user.semestre} | Grupo ${user.grupo}`;
    document.getElementById("correo").innerText = user.correo;

    startQR();
  }else{
    document.getElementById("error").style.display = "block";
  }
}

function generateQR(){
  const timestamp = Math.floor(Date.now()/1000);
  const data = `${user.cuenta}|${timestamp}`;
  QRCode.toCanvas(document.getElementById("qrCanvas"), data);
}

function startQR(){
  let timeLeft = 60;
  generateQR();

  interval = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = "Expira en: " + timeLeft + "s";

    if(timeLeft <= 0){
      generateQR();
      timeLeft = 60;
    }
  },1000);
}

function logout(){
  clearInterval(interval);
  document.getElementById("credencial").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

</script>

</body>
</html>
